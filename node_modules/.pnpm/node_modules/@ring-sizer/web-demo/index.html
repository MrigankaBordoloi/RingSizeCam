<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ring Sizer — Web Component Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px;
    }

    ring-sizer {
      width: 100%;
      max-width: 720px;
      height: 70vh;
      border-radius: 12px;
      overflow: hidden;
    }

    #event-log-panel {
      width: 100%;
      max-width: 720px;
    }

    #toggle-mount-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #e0e0e0;
      cursor: pointer;
      margin-bottom: 8px;
    }

    #toggle-mount-btn:hover {
      background: rgba(255,255,255,0.1);
    }

    #event-log {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px;
      font-family: 'Consolas', 'Fira Code', monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <!-- This is the entire embed: one custom element, configured via attributes. -->
  <ring-sizer api-key="demo-key" locale="en-US" size-chart-id="us-default"></ring-sizer>

  <div id="event-log-panel">
    <button id="toggle-mount-btn">Unmount ring-sizer</button>
    <pre id="event-log">Waiting for events…</pre>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
